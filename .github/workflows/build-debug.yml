name: Build Debug

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'fpd/**'
      - '.github/workflows/build-debug.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'fpd/**'
      - '.github/workflows/build-debug.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android
          override: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: master

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon
        env:
          KEYSTORE_FILE: debug.keystore
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android
          ZIG_EXE: /opt/hostedtoolcache/zig/master/x64/zig

      - name: Copy Debug APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/*.apk artifacts/FolkPatch-Debug.apk

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: folkpatch-debug-${{ github.sha }}
          path: artifacts/FolkPatch-Debug.apk
          retention-days: 30

      - name: Create Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/FolkPatch-Debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
